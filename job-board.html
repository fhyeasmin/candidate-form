<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merittide — Opportunities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --ink:#2B1832;
    --paper:#FBF6FA;
    --teal:#8E3A8C;
    --cta-teal:#4FA79E;
    --gray:#8A7F91;
    --line:#EADCE8;
    --card:#FFFFFF;
  }

  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',sans-serif; min-height:100vh;
  }

  /* Widened from 920px so the page uses more of a full desktop screen */
  .wrap{ max-width:1240px; margin:0 auto; padding:64px 32px 100px; }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--teal);
    letter-spacing:.1em; text-transform:uppercase; margin-bottom:10px;
  }
  h1{
    font-family:'Fraunces',serif; font-weight:500;
    font-size:clamp(30px,5vw,44px); margin:0 0 12px; line-height:1.15;
  }
  .subhead{ color:var(--gray); font-size:16px; max-width:520px; margin:0 0 48px; line-height:1.6; }

  .job-list{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:22px; }

  .job-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 26px; cursor:pointer;
    display:flex; flex-direction:column; gap:16px;
    transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  }
  .job-card:hover{
    border-color:var(--teal); transform:translateY(-4px);
    box-shadow:0 12px 28px rgba(43,24,50,0.08);
  }
  .job-main{ display:flex; flex-direction:column; gap:10px; }
  .job-title{ font-family:'Fraunces',serif; font-weight:500; font-size:21px; line-height:1.3; }
  .job-meta{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:2px; }
  .job-code{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gray);
    letter-spacing:.05em;
  }
  .tag{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.05em;
    text-transform:uppercase; padding:4px 10px; border-radius:100px;
    border:1px solid var(--line); color:var(--gray);
  }
  .tag.type-full{ border-color:#8E3A8C55; color:var(--teal); }
  .tag.type-part{ border-color:#4FA79E66; color:#2E7369; }
  .comp{ font-size:14px; color:var(--ink); font-weight:500; }
  .view-link{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.05em;
    color:var(--teal); text-transform:uppercase; margin-top:auto; padding-top:6px;
    display:flex; align-items:center; gap:6px; transition:gap .15s ease;
  }
  .job-card:hover .view-link{ gap:10px; }

  .empty-state, .status-msg{
    text-align:center; padding:60px 20px; color:var(--gray);
    font-family:'Fraunces',serif; font-size:18px;
  }

  /* ---------- skeleton loading state ---------- */
  .skeleton-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:28px 26px; display:flex; flex-direction:column; gap:14px;
  }
  .skel-line{
    height:14px; border-radius:5px;
    background:linear-gradient(90deg, var(--line) 25%, #F5EAF3 50%, var(--line) 75%);
    background-size:200% 100%; animation:shimmer 1.3s infinite;
  }
  @keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

  /* ---------- detail overlay ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(27,36,48,0.45);
    display:none; align-items:flex-start; justify-content:center;
    padding:40px 20px; overflow-y:auto; z-index:50;
    opacity:0; transition:opacity .25s ease;
  }
  .overlay.open{ display:flex; opacity:1; }

  /* Widened from 720px so the job description isn't cramped */
  .detail-panel{
    background:var(--paper); max-width:960px; width:100%;
    border-radius:16px; padding:0 0 48px;
    position:relative; overflow:hidden;
    transform:translateY(16px); transition:transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .overlay.open .detail-panel{ transform:translateY(0); }

  .accepting-banner{
    background:var(--cta-teal); color:#fff; text-align:center;
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.06em;
    text-transform:uppercase; padding:10px; position:relative;
  }

  .detail-body{ padding:36px clamp(24px,5vw,64px) 0; }

  .close-btn{
    position:absolute; top:14px; right:20px;
    background:none; border:none; font-size:22px; color:#fff;
    cursor:pointer; line-height:1; padding:6px;
  }
  .close-btn:hover{ opacity:.8; }

  .back-link{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--gray);
    text-decoration:none; display:inline-flex; align-items:center; gap:6px;
    margin-bottom:20px; cursor:pointer; background:none; border:none; padding:0;
  }
  .back-link:hover{ color:var(--teal); }

  .detail-top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:22px; flex-wrap:wrap; }
  .detail-title{
    font-family:'Fraunces',serif; font-weight:600; font-size:clamp(24px,4vw,32px);
    margin:0; line-height:1.2;
  }

  .apply-btn{
    display:inline-block; flex-shrink:0;
    background:var(--teal); color:#fff; text-decoration:none;
    font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
    padding:12px 26px; border-radius:6px;
    transition:background .15s ease, transform .12s ease;
  }
  .apply-btn:hover{ background:#742C72; }
  .apply-btn:active{ transform:scale(.97); }

  .meta-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    gap:18px; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:20px 22px; margin-bottom:30px;
  }
  .meta-item h4{
    font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:.06em; color:var(--gray); margin:0 0 6px; font-weight:500;
  }
  .meta-item p{ font-size:14px; font-weight:600; margin:0; color:var(--ink); }

  .detail-section{ margin-bottom:28px; }
  .detail-section h3{
    font-family:'Fraunces',serif; font-weight:600; font-size:17px;
    color:var(--ink); margin:0 0 12px;
  }
  .detail-section p{ font-size:15px; line-height:1.7; color:var(--ink); margin:0; }
  .detail-section ul{ margin:0; padding-left:20px; }
  .detail-section li{ font-size:15px; line-height:1.8; color:var(--ink); }
  .detail-section ol{ margin:0; padding-left:20px; }
  .detail-section ol li{ font-size:15px; line-height:1.9; color:var(--ink); }

  .apply-btn-bottom{
    display:inline-block; margin-top:8px;
    background:var(--teal); color:#fff; text-decoration:none;
    font-family:'Inter',sans-serif; font-weight:600; font-size:15px;
    padding:15px 32px; border-radius:6px;
    transition:background .15s ease, transform .12s ease;
  }
  .apply-btn-bottom:hover{ background:#742C72; }
  .apply-btn-bottom:active{ transform:scale(.97); }

  @media (max-width:560px){
    .job-list{ grid-template-columns:1fr; }
    .detail-top-row{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="wrap">
  <nav style="display:flex; align-items:center; justify-content:space-between; padding:0 0 26px; margin-top:-26px;">
    <a href="index.html" style="font-family:'Fraunces',serif; font-weight:600; font-size:19px; color:var(--ink); text-decoration:none;">Merittide</a>
    <a href="index.html" style="font-size:14px; color:var(--gray); text-decoration:none;">← Home</a>
  </nav>
  <div class="eyebrow">Careers</div>
  <h1>Opportunities</h1>
  <p class="subhead">Find a meaningful role to match your skills, aspirations, and values. Click any role below to see the full description.</p>

  <div class="job-list" id="jobList"></div>
  <div class="status-msg" id="statusMsg" style="display:none;"></div>
</div>

<div class="overlay" id="overlay">
  <div class="detail-panel">
    <div class="accepting-banner">
      Accepting Applications Now
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    <div class="detail-body" id="detailContent"></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */

// Where your application form lives.
const APPLICATION_FORM_URL = "candidate-intake.html";

// Same Apps Script Web App URL used by your application form —
// this fetches job postings from the "Jobs" tab of your Google Sheet.
const JOBS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5MsoggHuLQyt-cUpbLy5INk3LfrhVbiCT8r4aoA7b7iAD7Tsy3-kiHwEBgrMYbGf0/exec";

/* ============================================================
   ENGINE — no need to touch anything below this line
   ============================================================ */

let JOBS = [];
const jobList = document.getElementById('jobList');
const statusMsg = document.getElementById('statusMsg');
const overlay = document.getElementById('overlay');
const detailContent = document.getElementById('detailContent');
const closeBtn = document.getElementById('closeBtn');

// Show placeholder skeleton cards immediately, so the page feels
// responsive while the real data loads from the Sheet in the background.
function renderSkeleton(count){
  jobList.innerHTML = Array.from({length: count}).map(() => `
    <div class="skeleton-card">
      <div class="skel-line" style="width:40%;"></div>
      <div class="skel-line" style="width:70%; height:20px;"></div>
      <div class="skel-line" style="width:90%;"></div>
      <div class="skel-line" style="width:50%;"></div>
    </div>
  `).join('');
}

async function loadJobs(){
  renderSkeleton(4);
  try{
    const response = await fetch(JOBS_SCRIPT_URL);
    const result = await response.json();
    if(!result.success) throw new Error(result.error || 'Could not load jobs');
    JOBS = result.jobs || [];
    renderJobList();
  } catch(err){
    console.error('Failed to load jobs', err);
    jobList.innerHTML = '';
    showStatus("We couldn't load open roles right now — please refresh the page.");
  }
}

function showStatus(text){
  statusMsg.style.display = 'block';
  statusMsg.textContent = text;
}

function renderJobList(){
  if(JOBS.length === 0){
    jobList.innerHTML = '';
    showStatus('No open roles right now — check back soon.');
    return;
  }
  statusMsg.style.display = 'none';
  jobList.innerHTML = JOBS.map((job, i) => `
    <div class="job-card" data-index="${i}">
      <div class="job-main">
        <div class="job-code">${job.code}</div>
        <div class="job-title">${job.title}</div>
        <div class="job-meta">
          <span class="tag ${job.type && job.type.toLowerCase().includes('part') ? 'type-part' : 'type-full'}">${job.type}</span>
          <span class="comp">${job.salary}</span>
        </div>
      </div>
      <div class="view-link">View Details →</div>
    </div>
  `).join('');

  jobList.querySelectorAll('.job-card').forEach(card => {
    card.addEventListener('click', () => openDetail(JOBS[card.dataset.index]));
  });
}

function listSection(title, items){
  if(!items || items.length === 0) return '';
  return `
    <div class="detail-section">
      <h3>${title}</h3>
      <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;
}

function orderedSection(title, items){
  if(!items || items.length === 0) return '';
  return `
    <div class="detail-section">
      <h3>${title}</h3>
      <ol>${items.map(i => `<li>${i}</li>`).join('')}</ol>
    </div>`;
}

function textSection(title, text){
  if(!text) return '';
  return `
    <div class="detail-section">
      <h3>${title}</h3>
      <p>${text}</p>
    </div>`;
}

function openDetail(job){
  const applyUrl = `${APPLICATION_FORM_URL}?role=${encodeURIComponent(job.title)}`;
  detailContent.innerHTML = `
    <button class="back-link" id="backLink">← Back</button>
    <div class="detail-top-row">
      <h2 class="detail-title">${job.title}</h2>
      <a class="apply-btn" href="${applyUrl}">Apply Now</a>
    </div>

    <div class="meta-grid">
      <div class="meta-item"><h4>Job Category</h4><p>${job.category || '—'}</p></div>
      <div class="meta-item"><h4>Job Type</h4><p>${job.type || '—'}</p></div>
      <div class="meta-item"><h4>Location Type</h4><p>${job.locationType || '—'}</p></div>
      <div class="meta-item"><h4>Office Location</h4><p>${job.officeLocation || '—'}</p></div>
      <div class="meta-item"><h4>Salary</h4><p>${job.salary || '—'}</p></div>
      ${job.workWeek ? `<div class="meta-item"><h4>Work Week</h4><p>${job.workWeek}</p></div>` : ''}
    </div>

    ${textSection('Company Description', job.companyDescription)}
    ${textSection('About the Role', job.aboutRole)}
    ${listSection('Key Responsibilities', job.responsibilities)}
    ${listSection('Skills &amp; Qualifications', job.skills)}
    ${listSection('Employment Structure', job.employmentStructure)}
    ${orderedSection('Hiring Process', job.hiringProcess)}

    <a class="apply-btn-bottom" href="${applyUrl}">Apply Now</a>
  `;
  document.getElementById('backLink').addEventListener('click', closeDetail);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  overlay.scrollTop = 0;
}

function closeDetail(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

closeBtn.addEventListener('click', closeDetail);
overlay.addEventListener('click', e => { if(e.target === overlay) closeDetail(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDetail(); });

loadJobs();
</script>
</body>
</html>
